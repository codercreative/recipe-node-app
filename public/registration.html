<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/registration-login.css">
    <title>Registration</title>
  </head>
  <body>
    <header>
      <h1>Register</h1>
      <nav class="nav-header">
        <a class="nav-btn" href="index.html">Home</a>
      </nav>
    </header>
    <main>
      <h2>Please fill in this form to create an account. </h2>
      <h3>Once registered, log in to create and save all your recipes in a safe place.</h3>
  
    <form class="form" id="register-form">
      <label for="name">Name</label>
      <input
        id="name"
        type="text"
        placeholder="Enter name"
        name="name"
        required
      />
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        placeholder="Enter email"
        name="email"
        required
      />

      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        placeholder="Enter password"
        name="password"
        required
      />
        <button class="btn" type="submit">Submit</button>
      </div>
    </form>
    <p id="error-msg"></p>
  </main>
  <footer>&copy; 2026 Chris 👩‍🍳</footer>
    <script src="js/registration.js" defer></script>
  </body>
</html>
