<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/recipes.css" />
    <title>My Recipes</title>
  </head>
  <body>
    <header>
      <h1>My Recipes</h1>
      <p id="greeting"></p>
    </header>
    <main>
      <section class="add-recipe-section">
        <h2>Add a Recipe</h2>
        <form class="form" id="add-recipe-form">
          <label for="title">Title</label>
          <input
            id="title"
            type="text"
            placeholder="Enter title"
            name="title"
            required
          />
          <label for="ingredients"
            >Ingredients (enter one ingredient per line)</label
          >
          <textarea
            id="ingredients"
            placeholder="Enter ingredients"
            name="ingredients"
            required
          ></textarea>

          <label for="instructions"
            >Instructions (enter one instruction per line)</label
          >
          <textarea
            id="instructions"
            placeholder="How to prepare..."
            name="instructions"
            required
          ></textarea>

          <label for="preparation">Preparation Time</label>
          <input
            id="preparation"
            type="number"
            placeholder="Enter preparation time..."
            name="preparation"
            required
          />

          <label for="temp">Oven Temperature</label>
          <input
            id="temp"
            type="number"
            placeholder="Enter oven temperature (if recipe calls for it).."
            name="temp"
            required
          />
          <button class="btn" type="submit">Add Recipe</button>
        </form>
        <p id="error-msg"></p>
      </section>

      <section id="saved-recipes-section">
        <h2>Saved Recipes</h2>
        <div id="recipe-cards-container">
          <!-- article cards are inserted here with JS-->
        </div>
      </section>
    </main>
    <!-- <footer>&copy; 2026 Chris 👩‍🍳</footer> -->
    <script src="js/recipes.js" defer></script>
  </body>
</html>
