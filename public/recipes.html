<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/recipes.css" />
    <title>My Recipes</title>
  </head>
  <body>
    <header>
      <h1>My Recipes</h1>
      <nav class="nav-header">
        <button id="logoff-btn" class="nav-btn">Log Off</button>
      </nav>
    </header>
    <main>
      <section class="add-recipe-section">
        <h2>Add a Recipe</h2>
        <form class="add-recipe-form" id="add-recipe-form">
          <label for="title">Title</label>
          <input
            id="title"
            type="text"
            placeholder="Enter title"
            name="title"
            required
          />
          <label for="ingredients"
            >Ingredients (enter one ingredient per line)</label
          >
          <textarea
            id="ingredients"
            placeholder="Enter ingredients..."
            name="ingredients"
            required
          ></textarea>

          <label for="instructions"
            >Instructions (enter one instruction per line)</label
          >
          <textarea
            id="instructions"
            placeholder="How to prepare..."
            name="instructions"
            required
          ></textarea>

          <label for="preparation">Preparation Time (minutes)</label>
          <input
            id="preparation"
            type="number"
            placeholder="Enter preparation time..."
            name="preparation"
            required
          />

          <label for="temp">Oven Temperature (&deg;F)</label>
          <input
            id="temp"
            type="number"
            placeholder="Enter oven temperature (if recipe calls for it)..."
            name="temp"
            required
          />
          <button class="btn add-btn" type="submit">Add Recipe</button>
        </form>
        <p id="error-msg"></p>
      </section>

      <!-- section divider -->
      <hr class="section-divider" />

      <section class="saved-recipes-section" id="saved-recipes-section">
        <h2>Saved Recipes</h2>
        <div class="recipe-cards-container" id="recipe-cards-container">
          <!-- article cards are inserted here with JS-->
        </div>
      </section>
      <div id="modal-overlay" class="hidden modal-overlay">
        <div id="edit-modal" class="edit-modal">
          <form class="edit-form" id="edit-recipe-form">
            <label for="edit-title">Title</label>
            <input id="edit-title" type="text" />
            <label for="edit-ingredients">Ingredients</label>
            <textarea id="edit-ingredients" rows="4"></textarea>

            <label for="instructions">Instructions</label>
            <textarea id="edit-instructions" rows="4"></textarea>

            <label for="edit-preparation">Preparation Time (min.)</label>
            <input id="edit-preparation" type="number" />

            <label for="edit-temp">Oven Temperature (&deg;F)</label>
            <input id="edit-temp" type="number" />
            <div class="modal-btn-container">
              <button id="exit-btn" class="modal-cancel-btn" type="button">
                Cancel
              </button>
              <button id="save-edit-btn" class="modal-edit-btn" type="submit">
                Update
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="recipe-footer">&copy; 2026 Chris 👩‍🍳</footer>
    <script src="js/recipes.js" defer></script>
  </body>
</html>
